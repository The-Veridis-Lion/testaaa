<script>
  const toggleBtn = document.getElementById('theme-toggle');
  const htmlEl = document.documentElement;

  toggleBtn.addEventListener('click', () => {
    const currentTheme = htmlEl.getAttribute('data-theme');
    const icon = toggleBtn.querySelector('i');

    if (currentTheme === 'dark') {
      htmlEl.setAttribute('data-theme', 'light');
      icon.className = 'fas fa-moon';
    } else {
      htmlEl.setAttribute('data-theme', 'dark');
      icon.className = 'fas fa-sun';
    }
  });

  const batchToggleBtn = document.getElementById('batch-toggle');
  const appContainer = document.getElementById('app-container');
  const batchItemCheckboxes = document.querySelectorAll('.batch-item-checkbox');
  const btnSelectAll = document.getElementById('btn-select-all');
  const btnSelectInvert = document.getElementById('btn-select-invert');

  batchToggleBtn.addEventListener('click', () => {
    appContainer.classList.toggle('is-batch-mode');
    batchToggleBtn.classList.toggle('active');
  });

  btnSelectAll.addEventListener('click', () => {
    batchItemCheckboxes.forEach(cb => {
      cb.checked = true;
    });
  });

  btnSelectInvert.addEventListener('click', () => {
    batchItemCheckboxes.forEach(cb => {
      cb.checked = !cb.checked;
    });
  });
</script>
